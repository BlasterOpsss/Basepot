<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BasePot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0A0F1C;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 82, 255, 0.3);
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      background: #0A0F1C;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #0052FF;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3B82F6;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🔵 BasePot</h1>
    <p>💰 0.00 ETH</p>
    <p>⏳ Ends in 24:00:00</p>

    <input type="text" placeholder="0.001 ETH" />
    <button>Enter Pool</button>
  </div>

</body>
</html>
